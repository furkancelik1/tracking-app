<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <title>Offline – Routine Tracker</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fafafa;display:flex;align-items:center;justify-content:center;min-height:100dvh;text-align:center;padding:2rem}
      .container{max-width:28rem}
      .icon{font-size:4rem;margin-bottom:1.5rem}
      h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
      p{color:#a1a1aa;line-height:1.6;margin-bottom:1.5rem}
      button{background:#6366f1;color:#fff;border:none;padding:.75rem 2rem;border-radius:.5rem;font-size:1rem;cursor:pointer;transition:background .2s}
      button:hover{background:#4f46e5}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>It looks like you've lost your internet connection. Don't worry — your data is safe. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
